services:
  - type: web
    name: ais-obshepit
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn restaurant_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: obshepit-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
